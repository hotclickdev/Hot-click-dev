<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTCLICK — Crear Cuenta</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
    <div class="container">
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'">
                <span class="logo-icon">HC</span>
                <span class="logo-text">HOTCLICK</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html"      class="nav-link">Inicio</a>
                <a href="productos.html"  class="nav-link">Productos</a>
                <a href="categorias.html" class="nav-link">Categorías</a>
                <a href="nosotros.html"   class="nav-link">Nosotros</a>
                <a href="contacto.html"   class="nav-link">Contacto</a>
            </nav>
            <div class="nav-actions">
                <button class="icon-btn" id="cartBtn">🛒<span class="badge" id="cartCount">0</span></button>
                </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </div>
</header>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Inicio</a>
    <a href="productos.html">Productos</a>
    <a href="categorias.html">Categorías</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="contacto.html">Contacto</a>
</div>

<div class="auth-page" style="padding:32px 20px;">
    <div class="auth-card" style="max-width:500px;">
        <div class="auth-logo">
            <div class="logo" style="cursor:default;justify-content:center;">
                <span class="logo-icon">HC</span>
                <span class="logo-text">HOTCLICK</span>
            </div>
            <h2>Crear Cuenta</h2>
            <p>Regístrate para empezar a comprar</p>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Nombre</label>
                <input type="text" id="regNombre" class="form-input" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label class="form-label">Apellido paterno</label>
                <input type="text" id="regApellidoPaterno" class="form-input" placeholder="Apellido paterno">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Apellido materno</label>
                <input type="text" id="regApellidoMaterno" class="form-input" placeholder="Apellido materno">
            </div>
            <div class="form-group">
                <label class="form-label">Teléfono</label>
                <input type="text" id="regTelefono" class="form-input" placeholder="+506 0000-0000">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" id="regCorreo" class="form-input" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Identificación</label>
            <input type="text" id="regIdentificacion" class="form-input" placeholder="Número de cédula o pasaporte">
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" id="regPassword" class="form-input" placeholder="Mínimo 8 caracteres">
        </div>

        <button id="btnRegister" class="btn btn-primary" style="width:100%;margin-top:4px;">Crear Cuenta</button>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a><br>
            <a href="index.html" style="color:var(--c-muted);font-weight:400;">← Volver al inicio</a>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/cart.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    inicializarCarrito();
    actualizarContadorCarrito();

    document.getElementById('cartBtn').onclick = () => window.location.href = 'carrito.html';
    document.getElementById('mobileMenuBtn').onclick = () => document.getElementById('mobileMenu').classList.toggle('active');

    document.getElementById('btnRegister').addEventListener('click', async () => {
        const usuario = {
            nombre:           document.getElementById('regNombre').value,
            apellidoPaterno:  document.getElementById('regApellidoPaterno').value,
            apellidoMaterno:  document.getElementById('regApellidoMaterno').value,
            correo:           document.getElementById('regCorreo').value,
            telefono:         document.getElementById('regTelefono').value,
            identificacion:   document.getElementById('regIdentificacion').value,
            contrasenaHash:   document.getElementById('regPassword').value
        };
        const result = await apiRegister(usuario);
        if (result.success) {
            mostrarToast('✅ Registro exitoso. Ahora inicia sesión', 'success');
            setTimeout(() => window.location.href = 'login.html', 1500);
        } else {
            mostrarToast(result.message, 'error');
        }
    });
});
</script>
</body>
</html>
