# ====================================================
# HOT_CLICK OUTLET - CONFIGURACIÓN
# ====================================================

server.port=8080
spring.application.name=Hot_click_outlet

# ====================================================
# POSTGRESQL — Supabase Session Pooler (IPv4, Docker-compatible)
# Las variables de entorno de docker-compose sobreescriben estos valores
# ====================================================
spring.datasource.url=jdbc:postgresql://localhost:5433/hotclick_db
spring.datasource.username=postgres
spring.datasource.password=hotclick123
spring.datasource.driver-class-name=org.postgresql.Driver

# ====================================================
# JPA / HIBERNATE
# ====================================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ====================================================
# LOGGING
# ====================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
