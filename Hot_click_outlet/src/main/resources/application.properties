server.port=${PORT:8080}
spring.application.name=Hot_click_outlet

# ====================================================
# CONEXIÓN A SUPABASE - NUEVO PROYECTO (hotclick)
# ====================================================
# Session Pooler (IPv4) - Puerto 5432
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.nkevwfcjhjaawtdqquns}
spring.datasource.password=${DB_PASSWORD:HotClick2026!}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# ====================================================
# JPA / HIBERNATE
# ====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ✅ CRÍTICO: Respeta los nombres de las tablas en minúsculas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ====================================================
# LOGGING
# ====================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.zaxxer.hikari=DEBUG

# ====================================================
# SMTP — Gmail
# ====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hotclick.cr@gmail.com
spring.mail.password=${MAIL_PASSWORD:rsluhsnfexlfjike}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true