server.port=8080
spring.application.name=Hot_click_outlet

# ====================================================
# POSTGRESQL — Supabase Session Pooler (us-west-2, IPv4)
# Session Pooler es compatible con Hibernate/JPA
# ====================================================
spring.datasource.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.gwykydxwmuzchwojxqnn
spring.datasource.password=*3>kXINM#5C0
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# ====================================================
# JPA / HIBERNATE
# ====================================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ====================================================
# LOGGING
# ====================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO
